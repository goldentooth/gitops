---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiz6
  namespace: wiz6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiz6
  template:
    metadata:
      labels:
        app: wiz6
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: viewer
          image: ghcr.io/ndouglas/wiz6:sha-44df39c083344208f0ebc37ffd8540a1a70cf284
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
