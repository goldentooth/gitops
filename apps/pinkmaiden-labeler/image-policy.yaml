---
# Selects the newest image by run_number prefix (numerically sortable).
# Tags follow format: <run_number>-<sha> (e.g., "3-a1b2c3d4...")
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: pinkmaiden-labeler
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: pinkmaiden-labeler
  policy:
    numerical:
      order: asc
  filterTags:
    pattern: '^(?P<num>[0-9]+)-[a-f0-9]+$'
    extract: '$num'
