apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinkmaiden-labeler
  namespace: pinkmaiden-labeler
  labels:
    app: pinkmaiden-labeler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pinkmaiden-labeler
  template:
    metadata:
      labels:
        app: pinkmaiden-labeler
    spec:
      # Schedule on GPU node (Velaryon) — images are accessible there
      nodeSelector:
        role: gpu
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: platform
          operator: Equal
          value: "x86"
          effect: NoSchedule
      containers:
        - name: labeler
          image: registry.goldentooth.net/pinkmaiden-labeler:11-89ce6508ad9d88c7fb4f96ce09648c22fe781b55 # {"$imagepolicy": "flux-system:pinkmaiden-labeler"}
          ports:
            - name: http
              containerPort: 8642
              protocol: TCP
          env:
            - name: IMAGE_DIR
              value: /images
            - name: DB_PATH
              value: /data/labels.db
            - name: BATCH_SIZE
              value: "100"
            - name: THUMB_SIZE
              value: "256"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: images
              mountPath: /images
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: images
          nfs:
            server: dayne.local
            path: /volume1/Images
            readOnly: true
        - name: data
          hostPath:
            path: /var/lib/pinkmaiden-labeler
            type: DirectoryOrCreate
