---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: theatre-git-sync
  namespace: theatre
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: git-sync
              image: alpine/git:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: theatre-secrets
                      key: github-token
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e

                  cd /workspace
                  git clone --depth 1 https://x-access-token:$GITHUB_TOKEN@github.com/goldentooth/theatre.git repo
                  cd repo

                  # Copy runtime state from PVC into repo
                  for char in /data/characters/*/; do
                    name=$(basename "$char")
                    dest="data/characters/$name"
                    mkdir -p "$dest/memory" "$dest/posts"
                    cp -r "$char/memory/" "$dest/memory/" 2>/dev/null || true
                    cp -r "$char/posts/" "$dest/posts/" 2>/dev/null || true
                  done

                  git config user.name "theatre-sync"
                  git config user.email "theatre-sync@goldentooth.net"
                  git add data/characters/
                  if ! git diff --cached --quiet; then
                    git commit -m "chore(sync): update character runtime state"
                    git push
                    echo "Pushed runtime state updates"
                  else
                    echo "No changes to sync"
                  fi
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: theatre-data
            - name: workspace
              emptyDir: {}
