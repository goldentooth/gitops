---
# Grants the theatre namespace's default service account cluster-wide read
# access to resources that theatre probes need to observe. Grows as new
# probes are added; keep it strictly read-only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: theatre-flux-reader
rules:
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: theatre-flux-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: theatre
roleRef:
  kind: ClusterRole
  name: theatre-flux-reader
  apiGroup: rbac.authorization.k8s.io
