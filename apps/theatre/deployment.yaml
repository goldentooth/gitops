apiVersion: apps/v1
kind: Deployment
metadata:
  name: goldentooth-theatre
  namespace: goldentooth-theatre
  labels:
    app: goldentooth-theatre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goldentooth-theatre
  template:
    metadata:
      labels:
        app: goldentooth-theatre
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: goldentooth-theatre
          image: ghcr.io/goldentooth/theatre:9-2248fa2d8c4bcdabae853946acf8dc299bb05fc5 # {"$imagepolicy": "flux-system:theatre"}
          imagePullPolicy: Always
          args: ["serve"]
          env:
            - name: THEATRE_DATA_DIR
              value: "/data"
            - name: THEATRE_PORT
              value: "8080"
            - name: RUST_LOG
              value: "info"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: theatre-secrets
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: theatre-secrets
                  key: openai-api-key
          ports:
            - name: mcp
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secrets-files
              mountPath: /data/secrets
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: theatre-data
        - name: secrets-files
          secret:
            secretName: theatre-secrets
            items:
              - key: atproto-passwords.json
                path: atproto-passwords.json
