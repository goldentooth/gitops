apiVersion: apps/v1
kind: Deployment
metadata:
  name: goldentooth-theatre
  namespace: theatre
  labels:
    app: goldentooth-theatre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goldentooth-theatre
  template:
    metadata:
      labels:
        app: goldentooth-theatre
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: busybox:1.37
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add: ["CHOWN", "FOWNER"]
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: goldentooth-theatre
          image: ghcr.io/goldentooth/theatre:314-e88246059c1d8ae7f7fd6e1e3e94b94c1b39706b # {"$imagepolicy": "flux-system:theatre"}
          imagePullPolicy: Always
          args: ["serve"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: THEATRE_DATA_DIR
              value: "/data"
            - name: THEATRE_PORT
              value: "8080"
            - name: RUST_LOG
              value: "info"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: theatre-secrets
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: theatre-secrets
                  key: openai-api-key
            - name: THEATRE_POLL_INTERVAL_SECS
              value: "1800"
            - name: THEATRE_READING_FEED_URL
              value: "https://darkdell.net/reading/feed.xml"
          ports:
            - name: mcp
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secrets-files
              mountPath: /data/secrets
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: theatre-data
        - name: secrets-files
          secret:
            secretName: theatre-secrets
            items:
              - key: atproto-passwords.json
                path: atproto-passwords.json
