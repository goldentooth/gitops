---
# Flux Kustomization for Uptime Kuma status monitoring
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./apps/uptime-kuma
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: uptime-kuma
  timeout: 3m0s
  wait: true
