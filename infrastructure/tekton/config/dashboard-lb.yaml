---
# Tekton Dashboard service — routed via Cilium Gateway
apiVersion: v1
kind: Service
metadata:
  name: tekton-dashboard-lb
  namespace: tekton-pipelines
  labels:
    app: tekton-dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: 9097
      protocol: TCP
