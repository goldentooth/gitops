---
# ClusterIssuer for step-ca ACME provisioner
# This allows any namespace to request certificates via standard ACME protocol
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: step-ca-acme
spec:
  acme:
    # step-ca ACME directory URL (internal cluster service)
    server: https://step-ca.step-ca.svc.cluster.local/acme/acme/directory

    # Private CA — cert-manager needs to trust our root
    caBundle: 

    # ACME account private key storage
    privateKeySecretRef:
      name: step-ca-acme-account-key

    # HTTP-01 solver via Cilium Gateway API
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: goldentooth
                namespace: gateway
                kind: Gateway
