---
# Test certificate to validate ACME provisioner integration
# Uses the ACME ClusterIssuer with HTTP-01 challenge via Gateway API
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: acme-test-certificate
  namespace: cert-test
spec:
  secretName: acme-test-tls-secret

  # Certificate duration (24 hours to match policy)
  duration: 24h
  renewBefore: 8h

  subject:
    organizations:
      - Goldentooth

  commonName: acme-test.goldentooth.net

  dnsNames:
    - acme-test.goldentooth.net

  issuerRef:
    name: step-ca-acme
    kind: ClusterIssuer
    group: cert-manager.io
