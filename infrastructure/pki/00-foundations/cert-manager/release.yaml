---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "1.16.2"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  install:
    createNamespace: false
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Install CRDs as part of the Helm release
    crds:
      enabled: true

    # Global configuration
    global:
      leaderElection:
        namespace: cert-manager

    # Prometheus metrics (ServiceMonitor disabled for now)
    prometheus:
      enabled: true
      servicemonitor:
        enabled: false

    # Controller configuration — enable Gateway API for ACME HTTP-01 solvers
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true

    # Resource limits for the controller.
    # Controller memory scales with the number of Certificates/Secrets it
    # caches in its informers (plus Gateway API watches). 128Mi was too tight
    # and OOMKilled the controller in a tight crash loop (exit 137), which
    # silently halted all renewals — the short-lived step-ca certs then expired
    # within ~24h while the long-lived Let's Encrypt cert masked the outage.
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 512Mi

    # Webhook resource limits
    webhook:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi

    # CA Injector resource limits
    cainjector:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi
