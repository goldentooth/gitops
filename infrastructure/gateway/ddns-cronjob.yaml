---
# Discovers the cluster's public IP and updates Route53 A records for
# public-facing services. Runs every 5 minutes.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns-updater
  namespace: gateway
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ddns-updater
          restartPolicy: OnFailure
          containers:
            - name: ddns
              image: amazon/aws-cli:2.27.31
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  PUBLIC_IP=$(curl -sf https://ifconfig.me || curl -sf https://api.ipify.org || curl -sf https://checkip.amazonaws.com)
                  if [ -z "$PUBLIC_IP" ]; then
                    echo "ERROR: could not determine public IP"
                    exit 1
                  fi
                  echo "Public IP: $PUBLIC_IP"

                  # Check current record value.
                  CURRENT=$(aws route53 list-resource-record-sets \
                    --hosted-zone-id "$ZONE_ID" \
                    --query "ResourceRecordSets[?Name=='pds.goldentooth.net.' && Type=='A'].ResourceRecords[0].Value" \
                    --output text 2>/dev/null || echo "NONE")

                  if [ "$CURRENT" = "$PUBLIC_IP" ]; then
                    echo "pds.goldentooth.net: already up to date ($PUBLIC_IP)"
                    exit 0
                  fi

                  echo "pds.goldentooth.net: updating $CURRENT -> $PUBLIC_IP"
                  aws route53 change-resource-record-sets \
                    --hosted-zone-id "$ZONE_ID" \
                    --change-batch "{
                      \"Changes\": [{
                        \"Action\": \"UPSERT\",
                        \"ResourceRecordSet\": {
                          \"Name\": \"pds.goldentooth.net\",
                          \"Type\": \"A\",
                          \"TTL\": 60,
                          \"ResourceRecords\": [{\"Value\": \"$PUBLIC_IP\"}]
                        }
                      }]
                    }"
                  echo "Done."
              env:
                - name: ZONE_ID
                  value: "Z0736727S7ZH91VKK44A"
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: ddns-aws-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ddns-aws-credentials
                      key: secret-access-key
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
