---
# Discovers the cluster's public IP and updates Route53 A records for
# public-facing services. Runs every 5 minutes.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns-updater
  namespace: gateway
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ddns-updater
          restartPolicy: OnFailure
          containers:
            - name: ddns
              image: amazon/aws-cli:2.27.31
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  PUBLIC_IP=$(curl -sf https://ifconfig.me || curl -sf https://api.ipify.org || curl -sf https://checkip.amazonaws.com)
                  if [ -z "$PUBLIC_IP" ]; then
                    echo "ERROR: could not determine public IP"
                    exit 1
                  fi
                  echo "Public IP: $PUBLIC_IP"

                  # Build a batch of UPSERT changes for all public records.
                  CHANGES=""
                  for RECORD in pds.goldentooth.net "*.pds.goldentooth.net"; do
                    CURRENT=$(aws route53 list-resource-record-sets \
                      --hosted-zone-id "$ZONE_ID" \
                      --query "ResourceRecordSets[?Name=='${RECORD}.' && Type=='A'].ResourceRecords[0].Value" \
                      --output text 2>/dev/null || echo "NONE")
                    if [ "$CURRENT" = "$PUBLIC_IP" ]; then
                      echo "$RECORD: already up to date"
                    else
                      echo "$RECORD: updating $CURRENT -> $PUBLIC_IP"
                      [ -n "$CHANGES" ] && CHANGES="${CHANGES},"
                      CHANGES="${CHANGES}{\"Action\":\"UPSERT\",\"ResourceRecordSet\":{\"Name\":\"${RECORD}\",\"Type\":\"A\",\"TTL\":60,\"ResourceRecords\":[{\"Value\":\"${PUBLIC_IP}\"}]}}"
                    fi
                  done

                  if [ -z "$CHANGES" ]; then
                    echo "All records up to date."
                    exit 0
                  fi

                  aws route53 change-resource-record-sets \
                    --hosted-zone-id "$ZONE_ID" \
                    --change-batch "{\"Changes\":[${CHANGES}]}"
                  echo "Done."
              env:
                - name: ZONE_ID
                  value: "Z0736727S7ZH91VKK44A"
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: ddns-aws-credentials
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ddns-aws-credentials
                      key: secret-access-key
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
