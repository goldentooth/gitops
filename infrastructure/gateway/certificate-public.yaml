---
# Let's Encrypt wildcard certificate for public-facing services.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-tls-public
  namespace: gateway
spec:
  secretName: gateway-tls-public
  # Bound retained CertificateRequests for consistency (this LE cert renews
  # only ~every 60 days, so its backlog is small either way).
  revisionHistoryLimit: 3
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - "*.goldentooth.net"
    - goldentooth.net
    - "*.pds.goldentooth.net"
