---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litmus
  namespace: litmus
spec:
  parentRefs:
    - name: goldentooth
      namespace: gateway
      sectionName: https
  hostnames:
    - chaos-center.goldentooth.net
  rules:
    - backendRefs:
        - name: litmus-frontend-service
          port: 9091
