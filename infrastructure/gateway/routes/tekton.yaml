---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tekton-dashboard
  namespace: tekton-pipelines
spec:
  parentRefs:
    - name: goldentooth
      namespace: gateway
      sectionName: https
  hostnames:
    - tekton-dashboard.goldentooth.net
  rules:
    - backendRefs:
        - name: tekton-dashboard-lb
          port: 80
