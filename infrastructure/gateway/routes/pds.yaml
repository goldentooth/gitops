---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pds
  namespace: pds
  annotations:
    # Override external-dns target to public IP (updated by ddns CronJob).
    external-dns.alpha.kubernetes.io/target: "0.0.0.0"
spec:
  parentRefs:
    - name: goldentooth
      namespace: gateway
      sectionName: https-public
  hostnames:
    - pds.goldentooth.net
  rules:
    - backendRefs:
        - name: pds
          port: 3000
