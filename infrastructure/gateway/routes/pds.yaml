---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pds
  namespace: pds
spec:
  parentRefs:
    - name: goldentooth
      namespace: gateway
      sectionName: https-public
  hostnames:
    - pds.goldentooth.net
  rules:
    - backendRefs:
        - name: pds
          port: 3000
