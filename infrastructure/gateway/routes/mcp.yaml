---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: goldentooth-mcp
  namespace: goldentooth-mcp
spec:
  parentRefs:
    - name: goldentooth
      namespace: gateway
      sectionName: https
  hostnames:
    - mcp.goldentooth.net
  rules:
    - backendRefs:
        - name: goldentooth-mcp
          port: 8080
