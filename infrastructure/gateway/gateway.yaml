---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: goldentooth
  namespace: gateway
  annotations:
    metallb.io/address-pool: default
spec:
  gatewayClassName: cilium
  listeners:

    # HTTP listener — redirects all traffic to HTTPS
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener — catch-all, terminates TLS with the Let's Encrypt
    # wildcard cert (covers *.goldentooth.net, goldentooth.net, and
    # *.pds.goldentooth.net via the gateway-tls-public Certificate).
    # Existing HTTPRoutes attach here via sectionName: https.
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-tls-public
            namespace: gateway
      allowedRoutes:
        namespaces:
          from: All
