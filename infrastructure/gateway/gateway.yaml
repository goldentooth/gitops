---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: goldentooth
  namespace: gateway
  annotations:
    metallb.io/address-pool: default
spec:
  gatewayClassName: cilium
  listeners:

    # HTTP listener — redirects all traffic to HTTPS
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener — terminates TLS with Step-CA cert (internal/LAN)
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-tls
            namespace: gateway
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener — terminates TLS with Let's Encrypt cert (public)
    - name: https-public
      protocol: HTTPS
      port: 443
      hostname: "*.goldentooth.net"
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-tls-public
            namespace: gateway
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS listener for PDS handle subdomains (<name>.pds.goldentooth.net)
    - name: https-pds-handles
      protocol: HTTPS
      port: 443
      hostname: "*.pds.goldentooth.net"
      tls:
        mode: Terminate
        certificateRefs:
          - name: gateway-tls-public
            namespace: gateway
      allowedRoutes:
        namespaces:
          from: All
