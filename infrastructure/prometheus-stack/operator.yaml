---
# HelmRelease for kube-prometheus-stack
# This is the full monitoring stack including:
# - Prometheus Operator (manages Prometheus/Alertmanager/ServiceMonitor CRDs)
# - Prometheus (metrics collection and storage)
# - Grafana (visualization and dashboards)
# - Alertmanager (alert routing and notification)
# - Node Exporter (exports host-level metrics from each node)
# - Kube-State-Metrics (exports K8s object state metrics)
# - Pre-configured ServiceMonitors for K8s components (kubelet, apiserver, etc.)
#
# Everything configured with EPHEMERAL storage - data does not persist across pod restarts
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '>=60.0.0 <61.0.0'  # Use latest 60.x (supports K8s 1.34)
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h

  # Install into monitoring namespace (conventional for observability stack)
  targetNamespace: monitoring
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  values:
    # ==================================================================
    # PROMETHEUS OPERATOR
    # The controller that manages Prometheus/Alertmanager instances
    # ==================================================================
    prometheusOperator:
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi

      # Config reloader sidecar watches for ConfigMap changes
      prometheusConfigReloader:
        resources:
          limits:
            cpu: 100m
            memory: 50Mi
          requests:
            cpu: 50m
            memory: 25Mi

    # ==================================================================
    # PROMETHEUS
    # The actual metrics collection and storage engine
    # ==================================================================
    prometheus:
      prometheusSpec:
        storageSpec:
          disableMountSubPath: true
          volumeClaimTemplate:
            spec:
              storageClassName: seaweedfs
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 16Gi
        retention: 7d

        # Resources for Prometheus pods
        # Memory bumped from 2Gi after sustained OOMKills: 24h working-set peak
        # was 1.93 GiB against the 2Gi limit, restart count climbed to 8.
        resources:
          limits:
            cpu: 1000m
            memory: 4Gi
          requests:
            cpu: 250m
            memory: 2Gi

        # Scrape interval: How often to collect metrics
        scrapeInterval: 30s
        evaluationInterval: 30s

      service:
        type: ClusterIP

    # ==================================================================
    # ALERTMANAGER
    # Routes and manages alerts (emails, Slack, PagerDuty, etc.)
    # ==================================================================
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              disableMountSubPath: true
              storageClassName: seaweedfs
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi

        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi

      # Alert routing and notification config
      config:
        route:
          receiver: 'ntfy'
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: 'ntfy'
              matchers:
                - severity =~ "critical|warning"
        receivers:
          - name: 'ntfy'
            webhook_configs:
              # ntfy message templating (v2.11+): template=1 makes ntfy parse the
              # Alertmanager JSON body and render the title/message Go templates
              # against it, instead of dumping raw JSON into the notification.
              # Decoded query params:
              #   title  = {{if eq .status "firing"}}🔥 FIRING{{else}}✅ RESOLVED{{end}}: {{.commonLabels.alertname}}
              #   message= {{range .alerts}}{{.annotations.summary}} [{{.labels.severity}}/{{.labels.namespace}}]
              #            {{if .annotations.description}}{{.annotations.description}}{{end}}{{end}}
              # ntfy does NOT template priority/tags, so severity/state live in the title text.
              - url: 'http://ntfy.ntfy.svc.cluster.local/cluster-alerts?template=1&title=%7B%7Bif+eq+.status+%22firing%22%7D%7D%F0%9F%94%A5+FIRING%7B%7Belse%7D%7D%E2%9C%85+RESOLVED%7B%7Bend%7D%7D%3A+%7B%7B.commonLabels.alertname%7D%7D&message=%7B%7Brange+.alerts%7D%7D%7B%7B.annotations.summary%7D%7D+%5B%7B%7B.labels.severity%7D%7D%2F%7B%7B.labels.namespace%7D%7D%5D%0A%7B%7Bif+.annotations.description%7D%7D%7B%7B.annotations.description%7D%7D%0A%7B%7Bend%7D%7D%7B%7Bend%7D%7D'
                send_resolved: true

    # ==================================================================
    # GRAFANA
    # Visualization and dashboard interface
    # ==================================================================
    grafana:
      admin:
        existingSecret: "grafana-admin-credentials"
        userKey: "user"         # Key in secret containing username
        passwordKey: "password" # Key in secret containing password

      # EPHEMERAL STORAGE: Dashboards/datasources stored in tmpfs
      # You can provision dashboards via ConfigMaps to persist them in GitOps

      persistence:
        enabled: false  # No PVC, uses emptyDir by default

      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi

      service:
        type: ClusterIP

      # Datasource auto-configured to point to Prometheus in same namespace
      # This is done automatically by the chart

    # ==================================================================
    # NODE EXPORTER
    # DaemonSet that runs on every node, exports host metrics
    # (CPU, memory, disk, network at the OS level)
    # ==================================================================
    nodeExporter:
      enabled: false

    # ==================================================================
    # KUBE-STATE-METRICS
    # Exports metrics about Kubernetes objects themselves
    # (Pod status, Deployment replicas, Node conditions, etc.)
    # ==================================================================
    kubeStateMetrics:
      enabled: true

    # ==================================================================
    # DEFAULT ALERT RULES
    # ==================================================================
    # Talos Linux runs control plane components as static pods that
    # aren't scrapeable via standard ServiceMonitor paths, and Cilium
    # replaces kube-proxy entirely. These alerts will never resolve,
    # so we disable them.
    defaultRules:
      disabled:
        KubeControllerManagerDown: true
        KubeSchedulerDown: true
        KubeProxyDown: true

    # ==================================================================
    # DEFAULT SERVICE MONITORS
    # Pre-configured scrapers for K8s components
    # ==================================================================
    # Talos runs control plane components as static pods that aren't
    # scrapeable via the standard Service/Endpoints path. Cilium replaces
    # kube-proxy. Disable the ServiceMonitors that will never find targets
    # to avoid permanent TargetDown alerts.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
