---
# Keep an Alloy collector available during voluntary disruptions (2-replica Deployment).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: monitoring-alloy
  namespace: monitoring
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: monitoring-alloy
