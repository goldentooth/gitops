---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: falco
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: ">=4.0.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      interval: 12h

  targetNamespace: falco
  timeout: 15m
  install:
    crds: CreateReplace
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    disableWait: true
    remediation:
      retries: 3

  values:
    driver:
      kind: modern_ebpf
      loader:
        enabled: false

    collectors:
      containerd:
        enabled: true
        socket: /run/containerd/containerd.sock

    tty: false

    falco:
      json_output: true
      json_include_output_property: true
      json_include_tags_property: true
      time_format_iso_8601: true
      log_syslog: false
      syslog_output:
        enabled: false
      stdout_output:
        enabled: true
      http_output:
        enabled: true
        url: http://falco-falco-falcosidekick.falco.svc:2801
        insecure: true
      webserver:
        enabled: true
        prometheus_metrics_enabled: true
      metrics:
        enabled: true

    serviceMonitor:
      create: true
      labels:
        release: monitoring-kube-prometheus-stack

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    falcosidekick:
      enabled: true

      replicaCount: 1

      config:
        alertmanager:
          hostport: http://monitoring-kube-prometheus-alertmanager.monitoring.svc:9093
          minimumpriority: warning
        webhook:
          address: http://ntfy.ntfy.svc:80/falco
          minimumpriority: critical

      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

      webui:
        enabled: false
