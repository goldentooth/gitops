---
# dnsmasq DaemonSet for TFTP + proxy DHCP.
#
# Pinned to Velaryon via nodeSelector. Uses hostNetwork so DHCP/TFTP
# responses go out on the real cluster network interface. Tolerates
# Velaryon's GPU and platform taints.
#
# The init container downloads Talos kernel/initramfs and RPi firmware
# into the TFTP volume, then creates per-node directories using the
# node-inventory ConfigMap. On subsequent restarts, it skips downloads
# if files already exist and only refreshes the per-node cmdline.txt.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dnsmasq
  namespace: netboot
  labels:
    app: dnsmasq
spec:
  selector:
    matchLabels:
      app: dnsmasq
  template:
    metadata:
      labels:
        app: dnsmasq
    spec:
      nodeSelector:
        kubernetes.io/hostname: velaryon
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: platform
          operator: Equal
          value: "x86"
          effect: NoSchedule
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      initContainers:
        # Downloads Talos boot assets and RPi firmware, then creates
        # per-node TFTP directories with the appropriate config.txt
        # and cmdline.txt for each Pi model (4B / 5).
        - name: setup-boot-assets
          image: alpine:3.21
          command: ["/bin/sh", "/scripts/setup-boot-assets.sh"]
          volumeMounts:
            - name: tftpboot
              mountPath: /var/lib/tftpboot
            - name: setup-script
              mountPath: /scripts
            - name: node-inventory
              mountPath: /etc/netboot

      containers:
        - name: dnsmasq
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache dnsmasq
              exec dnsmasq --no-daemon --conf-file=/etc/dnsmasq/dnsmasq.conf
          ports:
            - containerPort: 67
              protocol: UDP
              name: dhcp
            - containerPort: 69
              protocol: UDP
              name: tftp
          volumeMounts:
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq
            - name: tftpboot
              mountPath: /var/lib/tftpboot
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_BIND_SERVICE"]

      volumes:
        - name: dnsmasq-config
          configMap:
            name: dnsmasq-config
        - name: tftpboot
          # hostPath instead of PVC: the DaemonSet is pinned to Velaryon
          # via nodeSelector, so there's no ambiguity about which node
          # owns this data. Avoids local-path-provisioner helper-pod
          # PodSecurity issues.
          hostPath:
            path: /var/lib/tftpboot
            type: DirectoryOrCreate
        - name: setup-script
          configMap:
            name: setup-boot-assets-script
            defaultMode: 0755
        - name: node-inventory
          configMap:
            name: node-inventory
