---
# dnsmasq Deployment — HA TFTP server for Pi network boot.
#
# WHY THIS REPLACED THE velaryon-PINNED DAEMONSET (2026-06 outage):
# the old DaemonSet was `nodeSelector: hostname=velaryon` + hostNetwork, so
# ALL netboot (and therefore the cluster's ability to re-boot any Talos node)
# died when velaryon went down — a single point of failure that turned one
# dead node into a cascading, un-recoverable-by-power-cycle outage.
#
# HA MODEL:
#   - The Pi EEPROMs hardcode TFTP_IP=10.4.0.30 (see eeprom-update*.yaml) and
#     the Talos cmdline points matchbox at 10.4.0.30:8080. 10.4.0.30 is the
#     immutable netboot anchor, so we keep it but float it via a MetalLB L2
#     VIP (dnsmasq-service.yaml) instead of pinning it to velaryon's host IP.
#   - 2 replicas spread (podAntiAffinity) across the DISK-BOOTING nodes only
#     (velaryon + the Ubuntu workers manderly/norcross/payne). Those nodes boot
#     from local disk and do NOT depend on netboot themselves — breaking the
#     circular dependency that made this unrecoverable. Never host netboot on a
#     node that itself netboots.
#   - The Service uses externalTrafficPolicy: Local, so MetalLB announces
#     10.4.0.30 only from a node that actually has a dnsmasq pod, and traffic is
#     NOT SNAT'd — TFTP (whose data replies come from an ephemeral port) works
#     correctly, the same as the old hostNetwork setup. On node death the VIP
#     fails over to the other replica's node.
#
# PROXY-DHCP MOVED OFF-CLUSTER: the old config also ran dnsmasq as a proxy-DHCP
# responder (broadcast, which needs hostNetwork and can't sit behind a VIP). The
# PXE boot options (next-server + filename) now come from the always-on UniFi
# DHCP server instead — see dnsmasq-configmap.yaml + MIGRATION.md. This container
# is now TFTP-only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnsmasq
  namespace: netboot
  labels:
    app: dnsmasq
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # never drop below 1 serving TFTP during a rollout
      maxSurge: 1
  selector:
    matchLabels:
      app: dnsmasq
  template:
    metadata:
      labels:
        app: dnsmasq
    spec:
      # Schedule ONLY on disk-booting nodes (they don't depend on netboot to
      # boot). Explicit hostnames for now; a `goldentooth.io/netboot-server`
      # node label set in the Talos/Ansible node config is the cleaner long-term
      # selector (see MIGRATION.md).
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["velaryon", "manderly", "norcross", "payne"]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: dnsmasq
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: platform
          operator: Equal
          value: "x86"
          effect: NoSchedule

      initContainers:
        # Downloads Talos boot assets + RPi firmware and builds per-node TFTP
        # directories (idempotent; skips existing files). Unchanged from the
        # DaemonSet — runs per replica, populating that node's hostPath.
        - name: setup-boot-assets
          image: alpine:3.21
          command: ["/bin/sh", "/scripts/setup-boot-assets.sh"]
          volumeMounts:
            - name: tftpboot
              mountPath: /var/lib/tftpboot
            - name: setup-script
              mountPath: /scripts
            - name: node-inventory
              mountPath: /etc/netboot
            - name: grub-arm64-efi
              mountPath: /grub

      containers:
        - name: dnsmasq
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache dnsmasq
              exec dnsmasq --no-daemon --conf-file=/etc/dnsmasq/dnsmasq.conf
          ports:
            - containerPort: 69
              protocol: UDP
              name: tftp
          volumeMounts:
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq
            - name: tftpboot
              mountPath: /var/lib/tftpboot
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            capabilities:
              # NET_BIND_SERVICE: bind UDP/69. NET_ADMIN no longer needed now
              # that we don't run DHCP.
              add: ["NET_BIND_SERVICE"]
          readinessProbe:
            # Gate the Service endpoint (and thus the MetalLB ETP:Local VIP
            # announcement) on the UDP/69 listener actually being open. TFTP is
            # UDP-only, so a tcpSocket probe would never pass — check the UDP
            # listener via busybox netstat instead.
            exec:
              command: ["/bin/sh", "-c", "netstat -lun 2>/dev/null | grep -q ':69 '"]
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: dnsmasq-config
          configMap:
            name: dnsmasq-config
        - name: tftpboot
          # Per-node local cache of boot assets, rebuilt by the initContainer.
          hostPath:
            path: /var/lib/tftpboot
            type: DirectoryOrCreate
        - name: setup-script
          configMap:
            name: setup-boot-assets-script
            defaultMode: 0755
        - name: node-inventory
          configMap:
            name: node-inventory
        - name: grub-arm64-efi
          configMap:
            name: grub-arm64-efi
