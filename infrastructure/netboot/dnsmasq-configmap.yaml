---
# dnsmasq configuration for Raspberry Pi network boot — TFTP-ONLY.
#
# As of the 2026-06 HA rework this runs as a plain TFTP server behind the
# floating 10.4.0.30 VIP (see dnsmasq-deployment.yaml + dnsmasq-service.yaml).
#
# PROXY-DHCP REMOVED: the old config also answered PXE via proxy-DHCP, which
# needs broadcast + hostNetwork and therefore can't sit behind a VIP (the thing
# that gives us HA). The PXE boot options now come from the always-on UniFi DHCP
# server instead — this is the fallback the previous comment already described.
#
# REQUIRED UniFi DHCP config for the 10.4.0.0/20 network (see MIGRATION.md):
#   - Network boot: ENABLED
#   - TFTP / next-server: 10.4.0.30
#   - Boot filename: pxelinux.0   (the GRUB EFI binary, for Pi 4 EDK2 UEFI PXE)
# Pi 5 / VideoCore EEPROM netboot ignores DHCP boot options entirely — it uses
# its hardcoded EEPROM TFTP_IP=10.4.0.30 + serial-number subdir — so it needs
# only a lease + TFTP at 10.4.0.30, both of which still hold.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-config
  namespace: netboot
data:
  dnsmasq.conf: |
    # Not a DNS server and not a DHCP server — TFTP only.
    port=0

    # Built-in TFTP server (served on the 10.4.0.30 VIP, UDP/69).
    enable-tftp
    tftp-root=/var/lib/tftpboot

    # Log TFTP transactions (useful for debugging boot issues).
    log-debug

    # Don't resolve anything, we're not a DNS server.
    no-resolv
    no-hosts
