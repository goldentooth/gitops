---
# Matchbox LoadBalancer service.
#
# Pinned to the netboot anchor 10.4.0.30:8080 — the address the generated Talos
# cmdline ALREADY targets (talos.config=http://10.4.0.30:8080/generic, see
# setup-boot-assets-script.yaml). The old 10.4.11.50 here was unused: matchbox
# was actually reached via velaryon's host IP (10.4.0.30) because the Deployment
# ran hostNetwork on velaryon. Now that the Deployment is HA + non-hostNetwork,
# this Service is the real path, so it must carry 10.4.0.30.
#
# Shares 10.4.0.30 with dnsmasq-tftp (UDP/69) via MetalLB allow-shared-ip — the
# annotation value MUST match dnsmasq-service.yaml.
apiVersion: v1
kind: Service
metadata:
  name: matchbox
  namespace: netboot
  labels:
    app: matchbox
  annotations:
    metallb.universe.tf/allow-shared-ip: "netboot-anchor"
    metallb.universe.tf/loadBalancerIPs: "10.4.0.30"
spec:
  type: LoadBalancer
  loadBalancerIP: 10.4.0.30        # kept for older MetalLB; the annotation is authoritative
  selector:
    app: matchbox
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
