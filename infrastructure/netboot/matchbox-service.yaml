---
# Matchbox LoadBalancer service.
#
# Pinned to the netboot anchor 10.4.11.30:8080 — the address the generated Talos
# cmdline targets (talos.config=http://10.4.11.30:8080/generic, see
# setup-boot-assets-script.yaml). 10.4.11.30 is a free MetalLB-pool IP shared with
# dnsmasq-tftp (UDP/69) via allow-shared-ip; the annotation value MUST match
# dnsmasq-service.yaml.
#
# (Was 10.4.0.30, velaryon's host IP, served via hostNetwork — the SPOF this
# rework removes. The old matchbox-service IP 10.4.11.50 was unused.)
apiVersion: v1
kind: Service
metadata:
  name: matchbox
  namespace: netboot
  labels:
    app: matchbox
  annotations:
    metallb.universe.tf/allow-shared-ip: "netboot-anchor"
    metallb.universe.tf/loadBalancerIPs: "10.4.11.30"
spec:
  type: LoadBalancer
  selector:
    app: matchbox
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
