---
# PRODUCTION HA netboot — dnsmasq TFTP, hostNetwork, bound to the floating VIP 10.4.0.8.
# REVIEW ONLY (ha/ not in ../kustomization.yaml). See ha/README.md.
#
# TFTP-only + bind-dynamic: the VIP-holder (kube-vip leader) answers TFTP FROM 10.4.0.8
# (no NAT → works; validated). No proxy-DHCP here on purpose — running it on 3 nodes would
# be 3 PXE responders. The Pi VideoCore stage uses its EEPROM TFTP_IP=10.4.0.8 directly;
# the Pi4 EDK2 stage-2 boot pointer comes from UniFi DHCP next-server=10.4.0.8 (see README).
#
# Reuses the existing boot-asset ConfigMaps. NOTE: setup-boot-assets-script bakes the matchbox
# URL into grub.cfg — it must be http://10.4.0.8:8080 (a one-line change to that script,
# applied at migration; matchbox@10.4.0.8 is up for both old+new Pis during the parallel
# phase). See README step 1.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-ha-config
  namespace: netboot
data:
  dnsmasq.conf: |
    # Not a DNS or DHCP server — TFTP only.
    port=0
    enable-tftp
    tftp-root=/var/lib/tftpboot
    # Bind per-address; answer on 10.4.0.8 only on the node currently holding the VIP.
    # This is what makes TFTP replies come FROM 10.4.0.8 (no NAT).
    bind-dynamic
    listen-address=10.4.0.8
    log-debug
    no-resolv
    no-hosts
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dnsmasq-ha
  namespace: netboot
  labels:
    app: dnsmasq-ha
spec:
  selector:
    matchLabels:
      app: dnsmasq-ha
  template:
    metadata:
      labels:
        app: dnsmasq-ha
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["manderly", "norcross", "payne"]
      initContainers:
        # Same boot-asset build as the live dnsmasq — populates this node's hostPath
        # /var/lib/tftpboot (Talos kernel/initramfs, RPi firmware, GRUB, per-node dirs).
        - name: setup-boot-assets
          image: alpine:3.21
          command: ["/bin/sh", "/scripts/setup-boot-assets.sh"]
          volumeMounts:
            - { name: tftpboot, mountPath: /var/lib/tftpboot }
            - { name: setup-script, mountPath: /scripts }
            - { name: node-inventory, mountPath: /etc/netboot }
            - { name: grub-arm64-efi, mountPath: /grub }
      containers:
        - name: dnsmasq
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache dnsmasq
              exec dnsmasq --no-daemon --conf-file=/etc/dnsmasq/dnsmasq.conf
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - { name: dnsmasq-config, mountPath: /etc/dnsmasq }
            - { name: tftpboot, mountPath: /var/lib/tftpboot }
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "netstat -lun 2>/dev/null | grep -q ':69 '"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: dnsmasq-config
          configMap:
            name: dnsmasq-ha-config
        - name: tftpboot
          hostPath:
            path: /var/lib/tftpboot
            type: DirectoryOrCreate
        - name: setup-script
          configMap:
            name: setup-boot-assets-script
            defaultMode: 0755
        - name: node-inventory
          configMap:
            name: node-inventory
        - name: grub-arm64-efi
          configMap:
            name: grub-arm64-efi
