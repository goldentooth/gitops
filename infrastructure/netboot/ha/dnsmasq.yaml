---
# PRODUCTION HA netboot — dnsmasq TFTP, hostNetwork, bound to the floating VIP 10.4.0.8.
# REVIEW ONLY (ha/ not in ../kustomization.yaml). See ha/README.md.
#
# TFTP + bind-dynamic: the VIP-holder (kube-vip leader) answers TFTP FROM 10.4.0.8 (no NAT
# → works; validated). The Pi VideoCore stage uses its EEPROM TFTP_IP=10.4.0.8 directly.
#
# Boot pointer for the Pi4 EDK2 stage-2 (chainloads GRUB): two ways, ONE at a time —
#   - bootstrap: UniFi DHCP next-server=10.4.0.8 (manual, in use now), OR
#   - IaC end-state: in-cluster PROXY-DHCP (the commented block below). Enabling it puts the
#     boot pointer in gitops and lets us delete the UniFi setting. See README step 7.
# Only Pi4 EDK2 needs this; Pi5 + all VideoCore stages use the EEPROM TFTP_IP directly.
#
# Reuses the existing boot-asset ConfigMaps. NOTE: setup-boot-assets-script bakes the matchbox
# URL into grub.cfg — it must be http://10.4.0.8:8080 (a one-line change to that script,
# applied at migration; matchbox@10.4.0.8 is up for both old+new Pis during the parallel
# phase). See README step 1.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-ha-config
  namespace: netboot
data:
  dnsmasq.conf: |
    # No DNS server (port=0). TFTP always; proxy-DHCP optional (see below).
    port=0
    enable-tftp
    tftp-root=/var/lib/tftpboot
    # Bind per-address; answer on 10.4.0.8 only on the node currently holding the VIP.
    # This is what makes TFTP replies come FROM 10.4.0.8 (no NAT).
    bind-dynamic
    listen-address=10.4.0.8
    log-debug
    no-resolv
    no-hosts

    # --- IaC boot pointer (proxy-DHCP) — DISABLED until the cutover (README step 7) ---
    # Uncomment to move the Pi4 EDK2 boot pointer from UniFi next-server into gitops, then
    # REMOVE the UniFi next-server (only one source may answer). Proxy-DHCP issues NO leases
    # (UniFi still owns DHCP) — it only adds the PXE boot-server + filename.
    #
    # CAVEAT — multi-responder: DHCP is broadcast, so this may be answered by all 3 dnsmasq
    # pods (listen-address binds TFTP to the VIP, but DHCP broadcast reception is per-iface).
    # Multiple proxy-DHCP offers are usually fine, but Pi EEPROM firmware can be picky.
    # VALIDATE by rebooting one Pi4 through EDK2 with UniFi next-server removed. If picky,
    # FALLBACK to a single-replica proxy-DHCP responder (a replicas:1 Deployment with these
    # same 3 lines + dhcp-boot pointing at 10.4.0.8) instead of this DaemonSet.
    #
    # dhcp-range=10.4.0.0,proxy,255.255.240.0
    # dhcp-boot=pxelinux.0,,10.4.0.8
    # pxe-service=0,"Raspberry Pi Boot"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dnsmasq-ha
  namespace: netboot
  labels:
    app: dnsmasq-ha
spec:
  selector:
    matchLabels:
      app: dnsmasq-ha
  template:
    metadata:
      labels:
        app: dnsmasq-ha
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["manderly", "norcross", "payne"]
      initContainers:
        # Same boot-asset build as the live dnsmasq — populates this node's hostPath
        # /var/lib/tftpboot (Talos kernel/initramfs, RPi firmware, GRUB, per-node dirs).
        - name: setup-boot-assets
          image: alpine:3.21
          command: ["/bin/sh", "/scripts/setup-boot-assets.sh"]
          volumeMounts:
            - { name: tftpboot, mountPath: /var/lib/tftpboot }
            - { name: setup-script, mountPath: /scripts }
            - { name: node-inventory, mountPath: /etc/netboot }
            - { name: grub-arm64-efi, mountPath: /grub }
      containers:
        - name: dnsmasq
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache dnsmasq
              exec dnsmasq --no-daemon --conf-file=/etc/dnsmasq/dnsmasq.conf
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - { name: dnsmasq-config, mountPath: /etc/dnsmasq }
            - { name: tftpboot, mountPath: /var/lib/tftpboot }
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            # dnsmasq runs on every node (bind-dynamic) but only binds :69 on the node that
            # holds the VIP. So readiness = the process is up — NOT that :69 is bound, which
            # would leave the non-holder pods perpetually unready and fail flux health checks.
            exec:
              command: ["/bin/sh", "-c", "pidof dnsmasq >/dev/null"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: dnsmasq-config
          configMap:
            name: dnsmasq-ha-config
        - name: tftpboot
          hostPath:
            path: /var/lib/tftpboot
            type: DirectoryOrCreate
        - name: setup-script
          configMap:
            name: setup-boot-assets-script
            defaultMode: 0755
        - name: node-inventory
          configMap:
            name: node-inventory
        - name: grub-arm64-efi
          configMap:
            name: grub-arm64-efi
