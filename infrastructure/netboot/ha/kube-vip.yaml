---
# PRODUCTION HA netboot — kube-vip floats the netboot VIP 10.4.0.8.
#
# REVIEW ONLY: this directory (ha/) is intentionally NOT in ../kustomization.yaml, so flux
# does not apply it. Promote per ha/README.md (additive, in parallel with velaryon's live
# 10.4.0.30 — no stranding window).
#
# Validated 2026-06-25 (../validation/): k8s Lease election (no proto-112) + ARP floats
# 10.4.0.8 onto one disk-booting Pi5 worker; hostNetwork dnsmasq there serves TFTP from the
# VIP; clean failover. See ../IP-ALLOCATION.md.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: netboot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netboot-kube-vip
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netboot-kube-vip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netboot-kube-vip
subjects:
  - kind: ServiceAccount
    name: kube-vip
    namespace: netboot
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: netboot
  labels:
    app: kube-vip
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Disk-booting Pi5 workers only (they don't netboot themselves → no circular dep;
      # all eth0 → vip_interface=eth0). velaryon is intentionally excluded so its eth0/NIC
      # naming and its live 10.4.0.30 role don't complicate the float.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["manderly", "norcross", "payne"]
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.7
          args: ["manager"]
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          env:
            - { name: vip_arp, value: "true" }
            - { name: vip_interface, value: "eth0" }
            - { name: vip_cidr, value: "20" }
            - { name: address, value: "10.4.0.8" }
            - { name: cp_enable, value: "true" }     # host the VIP on the leader (no Service/DNAT)
            - { name: cp_namespace, value: "netboot" }
            - { name: svc_enable, value: "false" }
            - { name: vip_leaderelection, value: "true" }   # k8s Lease — no VRRP/proto-112
            - { name: vip_leasename, value: "netboot-vip" }
            - { name: vip_leaseduration, value: "5" }
            - { name: vip_renewdeadline, value: "3" }
            - { name: vip_retryperiod, value: "1" }
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
