---
# Keep the HA netboot stack available during voluntary disruptions. Each runs on the 3
# disk-booting Pi5 workers; maxUnavailable:1 means a multi-node drain can only take one at
# a time, so the VIP (kube-vip), TFTP (dnsmasq), and matchbox always survive a drain.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kube-vip
  namespace: netboot
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: kube-vip
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dnsmasq-ha
  namespace: netboot
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: dnsmasq-ha
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: matchbox-ha
  namespace: netboot
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: matchbox-ha
