---
# Matchbox serves Talos machine configs to booting Pis over HTTP.
#
# Phase 2 component: not strictly required for basic network booting
# (nodes can boot into maintenance mode and receive config via talosctl).
# But once enabled, nodes can auto-provision by fetching their config
# from Matchbox using the talos.config= kernel cmdline parameter.
#
# Machine configs are stored in a Secret (talos-machine-configs) that
# must be created manually:
#
#   kubectl -n netboot create secret generic talos-machine-configs \
#     --from-file=allyrion.yaml=cluster/clusterconfig/goldentooth-allyrion.yaml \
#     --from-file=bettley.yaml=cluster/clusterconfig/goldentooth-bettley.yaml \
#     ... (one --from-file per node)
#
# Groups and profiles are served from ConfigMaps.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchbox
  namespace: netboot
  labels:
    app: matchbox
spec:
  # HA (2026-06 outage): was replicas:1 + hostNetwork + nodeSelector=velaryon —
  # a single point of failure that died with velaryon. Now 2 replicas spread
  # across the disk-booting nodes, reached via the floating 10.4.0.30:8080 VIP
  # (matchbox-service.yaml) that the Talos cmdline already targets.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: matchbox
  template:
    metadata:
      labels:
        app: matchbox
    spec:
      # Same disk-booting-nodes constraint + spread as dnsmasq (see that file's
      # rationale). matchbox is plain HTTP behind a Service VIP, so it does NOT
      # need hostNetwork.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["velaryon", "manderly", "norcross", "payne"]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: matchbox
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: platform
          operator: Equal
          value: "x86"
          effect: NoSchedule
      containers:
        - name: matchbox
          image: quay.io/poseidon/matchbox:v0.11.0
          args:
            - -address=0.0.0.0:8080
            - -assets-path=
            - -log-level=debug
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            # Matchbox expects groups/*.json, profiles/*.json, generic/*
            # all under -data-path (default /var/lib/matchbox)
            - name: groups
              mountPath: /var/lib/matchbox/groups
            - name: profiles
              mountPath: /var/lib/matchbox/profiles
            - name: machine-configs
              mountPath: /var/lib/matchbox/generic
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: groups
          configMap:
            name: matchbox-groups
        - name: profiles
          configMap:
            name: matchbox-profiles
        # Machine configs contain certs/keys, so they live in a Secret.
        # Create this manually (see comment at top of file).
        - name: machine-configs
          secret:
            secretName: talos-machine-configs
            optional: true
