---
# dnsmasq TFTP VIP — the floating netboot anchor (10.4.11.30).
#
# 10.4.11.30 is a free address inside the MetalLB pool (10.4.11.0-10.4.15.254),
# so MetalLB L2 can own it and announce it from whichever node currently runs a
# dnsmasq pod, failing it over on node death. This is what makes netboot survive
# losing any single node (the 2026-06 outage was velaryon being the only netboot
# host). The Pi EEPROMs are reflashed from the old TFTP_IP=10.4.0.30 (velaryon's
# host IP, un-floatable) to TFTP_IP=10.4.11.30 — see eeprom-update*.yaml + HA-MIGRATION.md.
#
# externalTrafficPolicy: Local is REQUIRED: MetalLB announces the VIP only from a
# node with a ready dnsmasq endpoint and skips SNAT, so TFTP's ephemeral-port data
# replies reach the client correctly (what hostNetwork used to give us).
#
# Shares 10.4.11.30 with matchbox-service (port 8080) via MetalLB allow-shared-ip
# — both Services must carry the same annotation value.
apiVersion: v1
kind: Service
metadata:
  name: dnsmasq-tftp
  namespace: netboot
  labels:
    app: dnsmasq
  annotations:
    metallb.universe.tf/allow-shared-ip: "netboot-anchor"
    metallb.universe.tf/loadBalancerIPs: "10.4.11.30"
spec:
  type: LoadBalancer
  loadBalancerIP: 10.4.11.30        # kept for older MetalLB; the annotation is authoritative
  externalTrafficPolicy: Local
  selector:
    app: dnsmasq
  ports:
    - port: 69
      targetPort: 69
      protocol: UDP
      name: tftp
