---
# Shell script for the dnsmasq init container. Downloads Talos
# kernel/initramfs and RPi firmware files, then creates per-node
# TFTP directories using the node-inventory ConfigMap.
#
# On subsequent restarts, skips the download if files already exist
# and only refreshes the per-node directory structure (so inventory
# changes take effect without re-downloading ~100MB of firmware).
#
# To force a re-download (e.g. after a Talos version bump), delete
# the _shared/ directory in the TFTP PVC and restart the DaemonSet.
apiVersion: v1
kind: ConfigMap
metadata:
  name: setup-boot-assets-script
  namespace: netboot
data:
  setup-boot-assets.sh: |
    #!/bin/sh
    set -e

    # --- Configuration ---------------------------------------------------
    # Bump these when upgrading Talos or firmware.
    TALOS_VERSION="v1.11.1"
    # RPi overlay schematic (includes rpi_generic SBC overlay)
    TALOS_SCHEMATIC="3be8dcdb5d390122648d2336fc1e7a2dd584c8fc391492fc9ae009639b864a06"

    TFTP_ROOT="/var/lib/tftpboot"
    SHARED="${TFTP_ROOT}/_shared"
    INVENTORY="/etc/netboot/nodes.conf"

    # Talos factory URL for PXE artifacts. Falls back to GitHub releases
    # if the factory doesn't serve separate kernel/initramfs files.
    FACTORY="https://factory.talos.dev/image/${TALOS_SCHEMATIC}/${TALOS_VERSION}"
    GITHUB="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}"

    # RPi firmware from the upstream repository
    FW_BASE="https://github.com/raspberrypi/firmware/raw/stable/boot"

    apk add --no-cache wget > /dev/null 2>&1

    # --- Download shared boot assets ------------------------------------
    if [ -f "${SHARED}/vmlinuz" ] && [ -f "${SHARED}/initramfs.xz" ]; then
      echo "Boot assets already present in ${SHARED}, skipping download."
    else
      mkdir -p "${SHARED}"

      echo "Downloading Talos arm64 kernel..."
      # Try factory first (schematic-specific), fall back to GitHub releases
      if ! wget -q -O "${SHARED}/vmlinuz" "${FACTORY}/kernel-arm64" 2>/dev/null; then
        echo "  Factory unavailable, falling back to GitHub releases..."
        wget -q -O "${SHARED}/vmlinuz" "${GITHUB}/vmlinuz-arm64"
      fi

      echo "Downloading Talos arm64 initramfs..."
      if ! wget -q -O "${SHARED}/initramfs.xz" "${FACTORY}/initramfs-arm64.xz" 2>/dev/null; then
        echo "  Factory unavailable, falling back to GitHub releases..."
        wget -q -O "${SHARED}/initramfs.xz" "${GITHUB}/initramfs-arm64.xz"
      fi

      echo "Downloading RPi firmware (start4.elf, fixup4.dat)..."
      for f in start4.elf fixup4.dat; do
        wget -q -O "${SHARED}/${f}" "${FW_BASE}/${f}"
      done

      echo "Downloading device tree blobs..."
      for f in bcm2711-rpi-4-b.dtb bcm2712-rpi-5-b.dtb; do
        wget -q -O "${SHARED}/${f}" "${FW_BASE}/${f}"
      done

      echo "Boot assets downloaded."
      ls -lh "${SHARED}/"
    fi

    # --- Create per-node TFTP directories --------------------------------
    # Each Pi fetches from /<serial>/ on the TFTP server. We create a
    # directory per serial with symlinks to the shared files and per-node
    # config.txt + cmdline.txt.
    echo "Setting up per-node TFTP directories..."

    grep -v '^[[:space:]]*#' "${INVENTORY}" | grep -v '^[[:space:]]*$' | while read -r serial hostname mac ip model; do
      DIR="${TFTP_ROOT}/${serial}"
      mkdir -p "${DIR}"

      # Symlink kernel and initramfs
      ln -sf "../_shared/vmlinuz"      "${DIR}/vmlinuz"
      ln -sf "../_shared/initramfs.xz" "${DIR}/initramfs.xz"

      # Symlink Pi firmware
      for f in start4.elf fixup4.dat; do
        ln -sf "../_shared/${f}" "${DIR}/${f}"
      done

      # Device tree for the specific Pi model
      case "${model}" in
        pi4b)
          ln -sf "../_shared/bcm2711-rpi-4-b.dtb" "${DIR}/bcm2711-rpi-4-b.dtb"
          ;;
        pi5)
          ln -sf "../_shared/bcm2712-rpi-5-b.dtb" "${DIR}/bcm2712-rpi-5-b.dtb"
          ;;
      esac

      # config.txt - Raspberry Pi firmware configuration.
      # Conditional [pi4]/[pi5] sections let us use one file for both models.
      cat > "${DIR}/config.txt" <<'PICONF'
    [all]
    arm_64bit=1
    arm_boost=1
    kernel=vmlinuz
    initramfs initramfs.xz followkernel
    enable_uart=1
    disable_overscan=1

    [pi4]
    dtoverlay=disable-bt
    dtoverlay=disable-wifi

    [pi5]
    dtoverlay=disable-bt
    dtoverlay=disable-wifi
    PICONF

      # cmdline.txt - Talos kernel command line.
      # If STATE partition exists on local storage, Talos uses the config
      # stored there. The talos.config URL is only used on first boot or
      # after a STATE wipe (enters maintenance mode if the URL is absent
      # and no STATE partition is found).
      #
      # Phase 2: add "talos.config=http://<matchbox-ip>:8080/generic?mac=${mac}"
      # to enable auto-provisioning. For now, new nodes boot into maintenance
      # mode and get their config via talosctl apply-config.
      echo "talos.platform=metal console=tty0 console=ttyAMA0,115200 sysctl.kernel.kexec_load_disabled=1 talos.dashboard.disabled=1 init_on_alloc=1 slab_nomerge pti=on consoleblank=0 nvme_core.io_timeout=4294967295 printk.devkmsg=on" > "${DIR}/cmdline.txt"

      echo "  ${serial} -> ${hostname} (${model})"
    done

    echo "TFTP directory setup complete."
