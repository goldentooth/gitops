---
# Storage for TFTP boot assets (RPi firmware, Talos kernel/initramfs,
# per-node directories). Lives on Velaryon since the dnsmasq DaemonSet
# is pinned there. ~200MB total for 16 nodes (shared files + symlinks).
#
# Uses the default local-path StorageClass. The PV gets created on
# Velaryon because the consuming pod's nodeSelector pins it there.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tftpboot
  namespace: netboot
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
