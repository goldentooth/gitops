---
# kube-vip (ARP + k8s leader-election) — floats the test netboot VIP 10.4.0.8.
#
# Replaces keepalived: VRRP (IP proto 112) is not delivered host-to-host in this cluster
# (keepalived split-brained — all nodes MASTER). kube-vip elects the holder via a Kubernetes
# Lease (over the API — works) and gratuitous-ARPs 10.4.0.8 onto the leader's interface
# (ARP works here). No proto-112, no DNAT — the VIP lands as a real host IP, so the
# hostNetwork dnsmasq binds it and TFTP replies from 10.4.0.8 (validated in Test 1).
#
# Validation scope: Pi5 workers (manderly/norcross/payne), all eth0. vip_interface=eth0.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: netboot-validation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netboot-validation-kube-vip
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netboot-validation-kube-vip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netboot-validation-kube-vip
subjects:
  - kind: ServiceAccount
    name: kube-vip
    namespace: netboot-validation
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: netboot-validation
  labels:
    app: kube-vip
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["manderly", "norcross", "payne"]
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.7
          args: ["manager"]
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          env:
            - { name: vip_arp, value: "true" }
            - { name: vip_interface, value: "eth0" }
            - { name: vip_cidr, value: "20" }
            - { name: address, value: "10.4.0.8" }
            # Control-plane mode just hosts the VIP on the elected leader (no Service/DNAT).
            - { name: cp_enable, value: "true" }
            - { name: cp_namespace, value: "netboot-validation" }
            - { name: svc_enable, value: "false" }
            # Election via a k8s Lease — no VRRP/proto-112.
            - { name: vip_leaderelection, value: "true" }
            - { name: vip_leasename, value: "netboot-vip" }
            - { name: vip_leaseduration, value: "5" }
            - { name: vip_renewdeadline, value: "3" }
            - { name: vip_retryperiod, value: "1" }
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
