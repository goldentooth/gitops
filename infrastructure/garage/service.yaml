---
# Headless service for StatefulSet DNS and inter-node RPC.
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: garage
  labels:
    app: garage
spec:
  clusterIP: None
  selector:
    app: garage
  ports:
    - name: s3-api
      port: 3900
      targetPort: 3900
    - name: rpc
      port: 3901
      targetPort: 3901
    - name: web
      port: 3902
      targetPort: 3902
    - name: admin
      port: 3903
      targetPort: 3903
---
# ClusterIP service for S3 API access from within the cluster.
apiVersion: v1
kind: Service
metadata:
  name: garage-s3
  namespace: garage
  labels:
    app: garage
spec:
  type: ClusterIP
  selector:
    app: garage
  ports:
    - name: s3-api
      port: 3900
      targetPort: 3900
