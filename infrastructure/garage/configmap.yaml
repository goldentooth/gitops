---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    replication_factor = 2
    consistency_mode = "consistent"

    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"

    db_engine = "lmdb"
    compression_level = 1
    metadata_auto_snapshot_interval = "6h"

    rpc_bind_addr = "[::]:3901"

    [kubernetes_discovery]
    namespace = "garage"
    service_name = "garage"
    skip_crd = false

    [s3_api]
    api_bind_addr = "[::]:3900"
    s3_region = "garage"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.garage.goldentooth.net"

    [admin]
    api_bind_addr = "[::]:3903"
