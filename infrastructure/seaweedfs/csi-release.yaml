---
# SeaweedFS CSI driver - enables Kubernetes PVCs backed by SeaweedFS
# Creates StorageClass "seaweedfs" for dynamic provisioning
# Node plugin (DaemonSet) runs on all nodes to allow volume consumption anywhere
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: seaweedfs-csi-driver
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: seaweedfs
  dependsOn:
    - name: seaweedfs
  chart:
    spec:
      chart: seaweedfs-csi-driver
      version: ">=0.2.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: seaweedfs-csi-driver
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    remediation:
      retries: 3
    timeout: 10m

  values:
    seaweedfsFiler: "seaweedfs-seaweedfs-filer.seaweedfs.svc.cluster.local:8888"
    storageClassName: seaweedfs
    isDefaultStorageClass: false

    driverName: seaweedfs-csi-driver

    # Pin images to v1.4.5 - the chart's default "latest" tag is stale
    # and doesn't include mount service support added in v1.3.6
    seaweedfsCsiPlugin:
      image: chrislusf/seaweedfs-csi-driver:v1.4.5
    mountService:
      enabled: true
      image: chrislusf/seaweedfs-mount:v1.4.5

    controller:
      replicas: 1

    node:
      enabled: true

    csiAttacher:
      enabled: true

    csiSnapshotter:
      enabled: false
