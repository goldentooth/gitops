---
# Runner daemon configuration — labels determine which jobs this runner accepts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: .runner
      capacity: 1
      timeout: 3h
      labels:
        - "ubuntu-latest:docker://node:20-bookworm"
    cache:
      enabled: true
    container:
      network: ""
      privileged: false
      docker_host: "-"
