---
# Forgejo Actions runner — registers via shared secret, then runs as daemon.
# Init container creates .runner file; main container runs the daemon.
# DinD sidecar provides Docker Engine for container-based job execution.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      nodeSelector:
        node.kubernetes.io/disk-type: nvme
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: runner-config
          configMap:
            name: forgejo-runner-config
        - name: docker-sock
          emptyDir: {}
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - forgejo-runner
            - create-runner-file
            - --connect
            - --instance
            - http://forgejo-forgejo-http.forgejo.svc.cluster.local:3000
            - --name
            - bramble-runner
            - --secret
            - $(FORGEJO_RUNNER_SECRET)
          env:
            - name: FORGEJO_RUNNER_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner
                  key: token
          volumeMounts:
            - name: runner-data
              mountPath: /data
          workingDir: /data
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - sh
            - -c
            - |
              # Wait for DinD sidecar to create the Docker socket
              while [ ! -S /var/run/docker.sock ]; do sleep 1; done
              exec forgejo-runner daemon --config /etc/runner/config.yaml
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /etc/runner
            - name: docker-sock
              mountPath: /var/run
          workingDir: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
