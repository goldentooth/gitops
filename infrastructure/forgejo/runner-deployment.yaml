---
# Forgejo Actions runner — registers via shared secret, then runs as daemon.
# Init container creates .runner file; main container runs the daemon.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo
  labels:
    app: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      nodeSelector:
        node.kubernetes.io/disk-type: nvme
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: runner-config
          configMap:
            name: forgejo-runner-config
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - forgejo-runner
            - create-runner-file
            - --connect
            - --instance
            - http://forgejo-forgejo-http.forgejo.svc.cluster.local:3000
            - --name
            - bramble-runner
            - --secret
            - $(FORGEJO_RUNNER_SECRET)
          env:
            - name: FORGEJO_RUNNER_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner
                  key: token
          volumeMounts:
            - name: runner-data
              mountPath: /data
          workingDir: /data
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - forgejo-runner
            - daemon
            - --config
            - /etc/runner/config.yaml
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /etc/runner
          workingDir: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
