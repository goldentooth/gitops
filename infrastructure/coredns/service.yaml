---
# The cluster DNS Service. clusterIP is PINNED to 10.96.0.10 — every pod's
# /etc/resolv.conf and the kubelet point here, and the node-local-dns
# CiliumLocalRedirectPolicy matches this Service by name. It must never change.
apiVersion: v1
kind: Service
metadata:
  name: kube-dns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
    kubernetes.io/cluster-service: "true"
    kubernetes.io/name: CoreDNS
spec:
  clusterIP: 10.96.0.10
  ipFamilyPolicy: SingleStack
  selector:
    k8s-app: kube-dns
  ports:
    - name: dns
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
    - name: metrics
      port: 9153
      protocol: TCP
      targetPort: 9153
