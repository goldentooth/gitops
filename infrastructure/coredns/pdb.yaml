---
# Keep cluster DNS available during voluntary disruptions (node drains/maintenance).
# 3 replicas, anti-affinity-spread across nodes; this ensures a drain can't evict more
# than one at a time, so >=2 CoreDNS pods always stay up.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coredns
  namespace: kube-system
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      k8s-app: kube-dns
