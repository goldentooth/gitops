---
# CoreDNS, migrated from Talos-managed (cluster.coreDNS.disabled: true) to fully
# self-managed via GitOps so the Corefile, replica count, and resource limits are
# version-controlled and durable across node rebuilds. These manifests faithfully
# replicate what Talos bootstrapped (same names/labels/ClusterIP) so Flux ADOPTS
# the running objects in place — no delete/recreate, no DNS interruption.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coredns
  namespace: kube-system
