---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: "1.7.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
    timeout: 15m
  upgrade:
    remediation:
      retries: 3
    timeout: 15m
  values:
    defaultSettings:
      # Only create default disks on nodes with the Longhorn label
      createDefaultDiskLabeledNodes: true
      # Data path — NVMe SSDs are mounted here on the Pi 5 nodes
      defaultDataPath: /var/lib/longhorn
      # 2 replicas: 4 storage nodes, survives single-node failure,
      # good capacity utilization (~1.86TB usable from 3.7TB raw)
      defaultReplicaCount: 2
      # Reserve 15% per node (~140GB) for safety margin
      storageMinimalAvailablePercentage: 15
      # Faster failover for stateful workloads
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      # Taint toleration for if we ever taint storage nodes
      taintToleration: ""
      # Auto-salvage replicas when possible
      autoSalvage: true
      # Disable auto-upgrade of engine images (manual control)
      autoDeletePodWhenVolumeDetachedUnexpectedly: true

    persistence:
      defaultClassReplicaCount: 2
      defaultClass: true

    longhornManager:
      nodeSelector:
        node.kubernetes.io/disk-type: nvme
      tolerations: []

    longhornDriver:
      nodeSelector:
        node.kubernetes.io/disk-type: nvme
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute

    longhornUI:
      replicas: 1
      nodeSelector:
        node.kubernetes.io/disk-type: nvme

    # Monitoring — integrate with existing prometheus-stack
    metrics:
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
