---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: ntfy
  annotations:
    metallb.io/address-pool: default
    external-dns.alpha.kubernetes.io/hostname: ntfy.goldentooth.net
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: LoadBalancer
  selector:
    app: ntfy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
